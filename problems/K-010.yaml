known_results:
  - statement: Nonlinear stability of vacuum Kerr is proved for sufficiently small $|a|/M$ (Klainerman–Szeftel).
    regime: Nonlinear Einstein vacuum, asymptotically flat, small angular momentum per unit mass.
    significance: Strongest unconditional nonlinear theorem toward the full subextremal conjecture.
  - statement: >-
      Linearized Teukolsky/wave decay and mode stability on fixed subextremal Kerr are developed in depth (microlocal
      and physical-space methods).
    regime: Linearized gravity and scalar waves on exact Kerr.
    significance: Standard toolbox; not equivalent to nonlinear stability for all parameters.
  - statement: >-
      Sharp Price-law exponents and nonlinear tail matching are understood in restricted settings (e.g. linearized
      models, Schwarzschild); sharp nonlinear Kerr curvature tails are not settled.
    regime: Late-time asymptotics; mixed linear vs nonlinear literature.
    significance: Locates what “sharp Price law” demands beyond integrated decay.
remaining_gap: >-
  A complete answer must prove either instability or convergence to a precisely identified stationary or time-periodic
  family under explicit boundary conditions.
