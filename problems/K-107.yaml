math_required: >-
  Teukolsky separation; physical-space asymptotics; scattering operators in non-globally-hyperbolic regions; gauge
  reconstruction.
completion_criteria: >-
  A complete answer must define the map in explicit norms and prove sharp asymptotic formulas, including generic leading
  coefficients.
implications: Would clarify how exterior information is reprocessed by the blue-shift region.
