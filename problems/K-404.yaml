statement: Relate the low-energy resolvent structure of Kerr operators to universal late-time tail laws, including logarithmic singularities and their coefficients.
math_required: Low-energy microlocal analysis; Tauberian arguments; asymptotic inversion of Laplace/Fourier transforms.
