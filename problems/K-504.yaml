statement: >-
  Establish a quantitative classification of spherical null geodesics (including bifurcations with
  parameters $(M,a)$) and stability of the photon-region foliation under perturbations of the metric
  in a sharp topology.
math_required: >-
  Hamiltonian dynamics; Morse theory on energy surfaces; Kerr geometry; microlocal analysis of
  trapped sets as conic manifolds.
why_it_matters: >-
  The photon region anchors trapping estimates used across decay and QNM theory; a quantitative
  classification propagates into resolvent bounds.
completion_criteria: >-
  Explicit structural theorems with constants controlling how photon spheres deform under
  $C^k$ or Sobolev metric perturbations, including bifurcation tracking.
implications: >-
  Feeds uniform decay estimates and inverse-scattering geometric subproblems.
