id: K-504
title: Quantitative stability of the photon region and spherical null geodesics under near-Kerr perturbations
short_title: Photon-region stability (near-Kerr, quantitative)
cluster: spectral-scattering
theorem_status: open
problem_type: quantitative_sharpening
maturity: well_scoped
evidence_level: primary_refs_present
verification_state: imported_unverified
priority: normal
summary: >-
  Exact Kerr photon-sphere / photon-region geometry is classical; the open issue is quantitative control of
  how spherical null geodesics and the photon-region locus deform under near-Kerr metric perturbations.
problem_statement: >-
  Establish quantitative stability (in a sharp topology on the metric) for the photon-region foliation and
  spherical null geodesic structure under perturbations of subextremal Kerr—tracking bifurcations in $(M,a)$
  with explicit constants. The **exact** Kerr classification is classical; this problem targets **robust
  perturbation theory**, not rediscovering exact Kerr null geometry.
statement: >-
  Establish quantitative stability (in a sharp topology on the metric) for the photon-region foliation and
  spherical null geodesic structure under perturbations of subextremal Kerr—tracking bifurcations in $(M,a)$
  with explicit constants. The **exact** Kerr classification is classical; this problem targets **robust
  perturbation theory**, not rediscovering exact Kerr null geometry.
why_it_matters: >-
  The photon region anchors trapping estimates for decay and QNM problems; quantitative deformation theory feeds
  uniform microlocal bounds.
scope:
  background: >-
    Stationary or near-stationary vacuum exteriors close to Kerr; null geodesic flow and Hamiltonian dynamics
    on energy surfaces.
  equation_type: Null geodesic equations / Hamiltonian dynamics; spectral consequences stated separately.
  linearity: >-
    Metric perturbation is nonlinear in Einstein’s equations, but the first target may be geodesic/Morse
    theory on a **given** perturbed Lorentzian metric.
  regularity: $C^k$ or Sobolev metric perturbations as in the desired Morse/resolvent theorems.
  parameter_regime: >-
    Compact subintervals of subextremal $(M,a)$ where photon spheres persist and bifurcation points are
    isolated.
  asymptotics: Local to the trapping region; global asymptotic flatness as needed for the metric class.
  gauge_or_formulation: >-
    Invariant formulation of photon region (e.g. via conserved quantities / turning points) to avoid
    coordinate artifacts.
known_results:
  - statement: >-
      Classical description of spherical null geodesics and photon shells on **exact** Kerr (textbook /
      review level).
    regime: Exact Kerr geometry.
    significance: >-
      Baseline qualitative picture; this entry asks for **quantitative perturbation** refinements, not this
      baseline alone.
remaining_gap: >-
  Explicit structural theorems with constants controlling photon-region deformation under $C^k$ or Sobolev
  metric perturbations, including bifurcation tracking.
status_explanation: >-
  Quantitative sharpening relative to exact Kerr null geometry; paired conceptually with K-307 (dynamical
  trapping persistence) but focused here on **stationary null locus** stability.
math_required: >-
  Hamiltonian dynamics; Morse theory on energy surfaces; Kerr geometry; microlocal interpretation of trapped
  null geodesics.
completion_criteria: >-
  Structural theorems with constants relating metric deviation to photon-region deviation and bifurcation
  control.
implications: >-
  Uniform decay estimates and inverse-scattering geometric subproblems.
