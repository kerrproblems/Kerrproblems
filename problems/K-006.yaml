id: K-006
title: Kerr stability with BMS charges and nonlinear memory
short_title: BMS charges, memory, and Kerr stability compatibility
cluster: exterior-stability
theorem_status: open
problem_type: literature_reformulation
maturity: well_scoped
evidence_level: primary_refs_present
verification_state: imported_unverified
priority: normal
summary: >-
  Package asymptotic charges, BMS gauge choices, and nonlinear memory into a stability statement compatible
  with rigorous Kerr stability theory—a synthesis rather than a single classical one-line conjecture.
problem_statement: >-
  Build a formulation of asymptotically flat vacuum stability compatible with Bondi–Metzner–Sachs (BMS)
  charge bookkeeping and nonlinear gravitational memory: define charges and memory observables in the
  regularity class used by the stability proof, prove their finiteness and flux laws, and show consistency
  with convergence to a final Kerr state modulo gauge and parameter modulation.
statement: >-
  Build a formulation of asymptotically flat vacuum stability compatible with Bondi–Metzner–Sachs (BMS)
  charge bookkeeping and nonlinear gravitational memory: define charges and memory observables in the
  regularity class used by the stability proof, prove their finiteness and flux laws, and show consistency
  with convergence to a final Kerr state modulo gauge and parameter modulation.
why_it_matters: >-
  A black-hole stability theorem should align with the asymptotic observables used in waveform and memory
  analysis, not only with interior decay rates.
scope:
  background: Asymptotically flat vacuum Einstein equations; future null infinity and BMS framework.
  equation_type: Full nonlinear vacuum Einstein (stability-scale regularity).
  linearity: Nonlinear memory and BMS transformations are inherently nonlinear in the metric.
  regularity: >-
    Must match the function spaces of the chosen stability theorem (e.g. weighted Sobolev / polyhomogeneous
    classes at null infinity).
  parameter_regime: Compatible with near-subextremal Kerr stability regimes as they are proved (currently
    including small-$|a|$ windows).
  asymptotics: Asymptotically flat.
  gauge_or_formulation: >-
    BMS gauge fixing and memory definitions must be tied to the gauge used in the nonlinear stability
    construction.
known_results: []
remaining_gap: >-
  Decompose the target into: (i) define BMS charges and memory in the gauge of the near-Kerr stability
  framework; (ii) control nonlinear memory contributions under the same bootstrap; (iii) connect the
  charge/memory picture to the final Kerr identification and modulation of parameters. All three must be
  executed at theorem level.
status_explanation: >-
  This entry bundles infrastructure problems around a future stability statement; it is not a standard
  single-sentence “famous conjecture” but a quantitative/synthesis frontier built on stability theory.
math_required: >-
  Bondi–Sachs expansions; asymptotic symmetries; flux laws; gauge fixing at null infinity; nonlinear
  radiation estimates.
completion_criteria: >-
  A complete answer must define charges and memory in the chosen regularity class, prove finiteness and flux
  laws, and show consistency with final Kerr parameters.
implications: >-
  Connects rigorous PDE stability with the mathematical structure behind gravitational-wave observables.
