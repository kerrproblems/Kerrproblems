summary: >-
  Characterize the largest natural function class on the stationary axisymmetric orbit space where the Ernst potential
  uniquely pins down Kerr among vacuum solutions—**the intended PDE domain and boundary data are not yet
  literature-locked in this entry.**
problem_statement: >-
  In the stationary axisymmetric vacuum reduction, fix **concrete** data: (i) a simply connected orbit domain
  $\Omega \subset \mathbb{R}^2$ with stated boundary components (axis, horizon rods, infinity), (ii) a weighted Hölder
  or Sobolev class for the complex Ernst potential $\mathcal{E}$ encoding asymptotically flat fall-off at the designated
  end, and (iii) any auxiliary rod-structure/normalization conditions used in the Weyl/Papapetrou chart. **Theorem
  target:** prove uniqueness of the Kerr member in that function class from the reduced boundary-value problem, **or**
  exhibit non-uniqueness/counterexamples in the same class. The open database question is which maximal (in the
  partial-order of domains/classes) choice of (i–iii) is already treated in the literature versus still conjectural.
