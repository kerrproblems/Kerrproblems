id: K-108
title: Strong cosmic censorship in rotating $\Lambda>0$ black-hole interiors (conditional on a spectral–interior bridge)
short_title: SCC for Kerr–de Sitter type interiors (conditional)
cluster: interior-scc
theorem_status: conditional
problem_type: literature_reformulation
maturity: mostly_scoped
evidence_level: primary_refs_present
verification_state: editorial_revision_needed
priority: normal
summary: >-
  Relate quasinormal-mode decay and interior extendibility for Kerr–de Sitter / Kerr–Newman–de Sitter models;
  conclusions depend on which SCC regularity formulation and which linear spectral input are assumed.
problem_statement: >-
  Fix (i) a precise strong cosmic censorship regularity class ($C^k$ inextendibility, weaker $C^0$
  formulations, etc.) and (ii) a quantitative bridge from linear spectral data (quasinormal decay on the
  chosen $\Lambda>0$ background) to interior Cauchy-horizon behavior. Under that pair, determine whether SCC
  holds or fails for rotating charged $\Lambda>0$ black holes—especially tracking how thresholds move near
  extremality compared with $\Lambda=0$.
statement: >-
  Fix (i) a precise strong cosmic censorship regularity class ($C^k$ inextendibility, weaker $C^0$
  formulations, etc.) and (ii) a quantitative bridge from linear spectral data (quasinormal decay on the
  chosen $\Lambda>0$ background) to interior Cauchy-horizon behavior. Under that pair, determine whether SCC
  holds or fails for rotating charged $\Lambda>0$ black holes—especially tracking how thresholds move near
  extremality compared with $\Lambda=0$.
why_it_matters: >-
  Positive $\Lambda$ changes exterior decay and interior amplification; SCC statements are sensitive to both
  the regularity notion and the spectral input used.
scope:
  background: Kerr–de Sitter and Kerr–Newman–de Sitter–type solutions; interior up to Cauchy horizons.
  equation_type: >-
    Typically begins with test fields (scalar EM) and spectral theory; full gravity interior statements are
    further out.
  linearity: >-
    Much of the sharpest $\Lambda>0$ literature is linearized around a fixed background; nonlinear interior
    claims require separate hypotheses.
  regularity: >-
    Must name the SCC variant ($C^0$ extendibility vs higher regularity blow-up, etc.); different variants
    are not interchangeable.
  parameter_regime: >-
    Subextremal vs near-extremal rotation/charge; competition between slow QNM decay and blue-shift along
    inner horizons is regime-dependent.
  asymptotics: de Sitter / black-hole–de Sitter asymptotics as in the stated model.
  gauge_or_formulation: As in the cited spectral and interior PDE setups.
known_results: []
remaining_gap: >-
  Turn the conditional template above into a single published-quality conjecture with matching hypotheses,
  or a theorem under explicitly listed spectral and regularity assumptions.
status_explanation: >-
  **Condition (explicit):** results hinge on (A) the chosen SCC formulation and (B) the assumed implication
  from linear QNM decay (or related spectral quantities) to nonlinear interior regularity. Different papers
  may use different pairs $(A,B)$; this entry does not collapse them without further editorial verification.
  Marked `editorial_revision_needed` until maintainers align wording with a pinned reference set.
math_required: >-
  Spectral-gap estimates; de Sitter horizon boundary conditions; Sobolev regularity at Cauchy horizons;
  coupled gravito-electromagnetic systems where relevant.
completion_criteria: >-
  Connect spectral decay rates to extension regularity and prove either violation or restoration of SCC in a
  stated class matching $(A,B)$.
implications: >-
  Clarifies how SCC issues differ between $\Lambda=0$ and $\Lambda>0$ rotating models.
