id: K-203
title: Nonlinear fate of Aretakis instability
cluster: extremal
status: open
statement: Determine whether generic small perturbations of extremal Kerr settle to
  subextremal Kerr, remain extremal with horizon hair, or develop a stronger nonlinear
  instability.
math_required: Nonlinear continuation near degenerate horizons; parameter drift; horizon-local
  blow-up criteria; conserved-charge dynamics.
why_it_matters: The key physical question is whether the linear Aretakis effect survives,
  saturates, or resolves nonlinearly.
completion_criteria: A complete answer must prove one of the possible nonlinear outcomes
  for a generic class of perturbations and quantify the transition mechanism.
implications: Would tell us whether extremality is dynamically fragile or structurally
  persistent.
