math_required: Geometric blow-up limits; near-horizon analysis; scattering on non-asymptotically-flat geometries; matched expansions.
completion_criteria: >-
  A complete answer must prove operator and solution convergence under rescaling and define a genuine scattering theory
  in the limit geometry.
implications: Would isolate the intrinsic throat dynamics responsible for extremal instabilities.
