id: K-307
title: Persistence of normally hyperbolic trapping for dynamical near-Kerr spacetimes
short_title: Dynamical trapping stability (near-Kerr)
cluster: rigidity-uniqueness
theorem_status: open
problem_type: classical_frontier
maturity: well_scoped
evidence_level: primary_refs_present
verification_state: imported_unverified
priority: normal
summary: >-
  Show the Kerr normally hyperbolic trapped set persists in a quantitative microlocal sense for spacetimes
  compatible with nonlinear stability—not the static photon-region deformation problem in K-504.
problem_statement: >-
  Show that the normally hyperbolic trapped set of Kerr persists, in a quantitatively useful sense, for
  vacuum developments arising from initial data compatible with the nonlinear near-Kerr stability program
  (or a stated substitute class), and derive microlocal consequences (e.g. resolvent/Morawetz templates) from
  that persistence.
statement: >-
  Show that the normally hyperbolic trapped set of Kerr persists, in a quantitatively useful sense, for
  vacuum developments arising from initial data compatible with the nonlinear near-Kerr stability program
  (or a stated substitute class), and derive microlocal consequences (e.g. resolvent/Morawetz templates) from
  that persistence.
why_it_matters: >-
  Trapping governs decay estimates; dynamical persistence links geometry to time-dependent PDE control.
scope:
  background: Dynamical vacuum spacetimes near Kerr, not only linearized fields on fixed Kerr.
  equation_type: Full Einstein vacuum (global hypotheses as in stability).
  linearity: Nonlinear metric dynamics; microlocal analysis on evolving backgrounds.
  regularity: >-
    Sufficient regularity for normally hyperbolic dynamics on trapped sets (typically $C^2$ or stronger on
    the metric).
  parameter_regime: Near subextremal Kerr parameters in the stability topology on data.
  asymptotics: Asymptotically flat.
  gauge_or_formulation: >-
    Trapped-set statements should be diffeomorphism-invariant or stated modulo gauge used in decay theory.
known_results: []
remaining_gap: >-
  Quantitative persistence of trapped-set geometry with uniform microlocal constants under the dynamical
  class considered.
status_explanation: >-
  Complementary to K-504: this entry emphasizes **time-dependent** near-Kerr geometry and trapping for PDEs,
  whereas K-504 emphasizes **quantitative deformation** of the photon-region / spherical null geodesic locus
  in stationary or near-stationary settings.
math_required: >-
  Dynamical systems near trapped sets; semiclassical propagation; microlocal resolvent estimates;
  time-dependent geometry.
completion_criteria: >-
  Prove persistence and derive Morawetz/resolvent consequences with explicit hypotheses tied to stability data.
implications: >-
  Geometric backbone for robust decay on dynamical near-Kerr backgrounds.
