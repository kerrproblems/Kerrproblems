id: K-009
title: 'Einstein–massive Klein–Gordon near Kerr: classification of stable and unstable regimes'
short_title: Massive scalar on Kerr — regime classification
cluster: exterior-stability
theorem_status: open
problem_type: classical_frontier
maturity: well_scoped
evidence_level: primary_refs_present
verification_state: verified_recently
priority: normal
summary: >-
  Classify long-time dynamics for massive scalar fields coupled to near-Kerr geometries; superradiant
  instability occurs in rigorous open parameter families, so “stability” must be regime-specific.
problem_statement: >-
  For Einstein–massive Klein–Gordon with small coupling, classify dynamical outcomes near subextremal Kerr:
  dispersion toward Kerr, formation of long-lived quasi-bound configurations, or growth consistent with
  superradiant instability—stating explicit stable vs unstable mass/frequency/rotation windows at theorem
  level where possible, or a precise program to do so.
statement: >-
  For Einstein–massive Klein–Gordon with small coupling, classify dynamical outcomes near subextremal Kerr:
  dispersion toward Kerr, formation of long-lived quasi-bound configurations, or growth consistent with
  superradiant instability—stating explicit stable vs unstable mass/frequency/rotation windows at theorem
  level where possible, or a precise program to do so.
why_it_matters: >-
  Massive fields are the standard perturbation where pure vacuum dispersive intuition fails; superradiance
  can drive instability in open parameter sets.
scope:
  background: >-
    Asymptotically flat setting; massive scalar on subextremal Kerr (or near-Kerr solution if coupled back
    to gravity).
  equation_type: Massive Klein–Gordon; coupled Einstein–KG for the fully self-consistent problem.
  linearity: >-
    Linearized massive field on fixed Kerr is already nontrivial; nonlinear classification is strictly
    harder.
  regularity: Smooth or finite-energy solutions as in rigorous constructions of growing modes.
  parameter_regime: >-
    Must separate subextremal Kerr parameters $(M,a)$ and mass $\mu$ where exponential growth modes exist
    from complementary regimes.
  asymptotics: Asymptotically flat.
  gauge_or_formulation: Standard scalar field stress-energy; boundary conditions at horizon and infinity as in cited works.
known_results:
  - statement: >-
      Rigorous construction of finite-energy solutions to the massive Klein–Gordon equation on subextremal
      Kerr that grow exponentially in time, for an open family of nonzero masses (superradiant instability).
    regime: Linearized KG on exact subextremal Kerr, as in arXiv:1302.3448.
    significance: >-
      Any “unconditional stability” statement for massive scalars on Kerr is false without parameter
      exclusions; the problem must be phrased as classification or conditional stability.
remaining_gap: >-
  Global coupled Einstein–KG classification (including nonlinear end states) and sharp characterization of
  boundaries between dispersion, bounded motion, and instability across $(M,a,\mu)$.
status_explanation: >-
  Open global classification; the presence of rigorous instability results forces explicit regime wording.
math_required: >-
  Massive wave spectral theory; quasi-bound states; nonlinear bifurcation; dispersive estimates with
  trapping and superradiance.
completion_criteria: >-
  Theorem-level dynamical classification with explicit parameter regimes and asymptotic alternatives, or a
  modular conjecture with identified missing PDE steps.
implications: >-
  Clarifies long-time dynamics of rotating black holes with massive perturbations.
