problem_statement: >-
  Quantify how Kerr resonances and pseudospectra move under small perturbations of the geometry or operator and identify
  transient-growth mechanisms associated with non-normality.
statement: >-
  Quantify how Kerr resonances and pseudospectra move under small perturbations of the geometry or operator and identify
  transient-growth mechanisms associated with non-normality.
why_it_matters: QNMs are not enough by themselves if non-normal transient amplification dominates some time windows.
scope:
  background: Asymptotically flat four-dimensional general relativity unless the statement specifies otherwise.
