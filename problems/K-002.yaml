summary: >-
  In asymptotically flat vacuum Einstein gravity, nonlinear stability of Kerr is currently proved with quantitative
  constants that deteriorate as the subextremality margin $\varepsilon = 1 - |a|/M \downarrow 0$. This problem asks for a
  **uniform-in-$\varepsilon$** stability theorem in a precise topology on Cauchy data: either (i) existence of a
  quantitative stability window whose size and decay/Morawetz constants admit bounds independent of $\varepsilon$ on
  compact $\varepsilon$-subintervals of $(0,1)$, or (ii) a sharp theorem identifying the optimal blow-up rate of those
  constants as $\varepsilon \to 0^+$. “Stability” is meant in the same Cauchy-formulation sense as the small-$|a|/M$
  nonlinear theorems (convergence to a nearby Kerr solution modulo gauge and parameter modulation), not a separate
  extremal-black-hole asymptotic regime.
problem_statement: >-
  Fix a Cauchy formulation and data topology compatible with the nonlinear Kerr stability program (e.g. weighted Sobolev
  norms on a spacelike slice). Prove or disprove: there exist $\varepsilon_0>0$, $C>0$, and a modulus $\omega(\delta)$
  such that for all subextremal Kerr parameters with $0 < \varepsilon = 1-|a|/M \le \varepsilon_0$, initial data
  $\delta$-close to the corresponding Kerr slice evolve globally to a final Kerr state **with all bootstrap constants in
  the stability proof bounded by $C \omega(\delta)$ uniformly in $\varepsilon$** on each fixed compact subinterval
  $[\varepsilon_{\min},\varepsilon_0]$. Alternatively, exhibit an obstruction (e.g. sharp blow-up of a Morawetz/trapping
  constant) as $\varepsilon \to 0^+$ within that program.
statement: >-
  Fix a Cauchy formulation and data topology compatible with the nonlinear Kerr stability program (e.g. weighted Sobolev
