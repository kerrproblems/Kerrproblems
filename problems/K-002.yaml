  constant) as $\varepsilon \to 0^+$ within that program.
why_it_matters: >-
  Near-extremal Kerr is the transition region between the standard subextremal theory and the qualitatively different
  extremal regime.
scope:
  background: Asymptotically flat four-dimensional general relativity unless the statement specifies otherwise.
  equation_type: "PDE level: full-einstein."
  linearity: Includes or emphasizes nonlinear dynamics.
  regularity: Smooth / Sobolev classes as in the problem statement; tighten when citing a specific theorem.
  parameter_regime: >-
    Subextremal Kerr with $0 < 1-|a|/M \le \varepsilon_0$; uniformity is in $\varepsilon$ on compact subintervals of
