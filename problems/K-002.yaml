  asymptotics: asymptotically-flat
  gauge_or_formulation: >-
    State gauge/fixing class compatible with cited stability or interior programs (e.g. generalized harmonic,
    double-null interior charts).
known_results:
  - statement: Nonlinear stability of vacuum Kerr is proved for sufficiently small $|a|/M$ (Klainerman–Szeftel).
    regime: Nonlinear Einstein vacuum, asymptotically flat, small angular momentum per unit mass.
    significance: Strongest unconditional nonlinear theorem toward the full subextremal conjecture.
  - statement: >-
      Linearized Teukolsky/wave decay and mode stability on fixed subextremal Kerr are developed in depth (microlocal
      and physical-space methods).
    regime: Linearized gravity and scalar waves on exact Kerr.
    significance: Standard toolbox; not equivalent to nonlinear stability for all parameters.
  - statement: >-
      Sharp Price-law exponents and nonlinear tail matching are understood in restricted settings (e.g. linearized
      models, Schwarzschild); sharp nonlinear Kerr curvature tails are not settled.
    regime: Late-time asymptotics; mixed linear vs nonlinear literature.
    significance: Locates what “sharp Price law” demands beyond integrated decay.
remaining_gap: >-
  Separate uniform-in-$\varepsilon$ control of redshift, trapping/Morawetz, and Teukolsky-type estimates from
  parameter-dependent losses that may be removable by sharper analysis; connect any obstruction to geometric mechanisms
  (near-extremal photon sphere/trapping).
status_explanation: >-
  **Open (nonlinear, $\Lambda=0$ vacuum):** small-$|a|/M$ nonlinear stability is theorem-level; uniform stability as the
  subextremality margin tends to zero is not recorded here as proved. Linearized estimates on fixed Kerr still degenerate
  with surface gravity, so uniformity is a genuine analytic question—not a restatement of the unrestricted subextremal
  conjecture alone.
math_required: >-
  Degenerate redshift analysis; near-horizon scaling; semiclassical control near the photon region; uniform weighted
  energies in the surface-gravity parameter $\kappa$.
completion_criteria: >-
  A theorem or sharp counterexample that specifies which constants blow up (if any) as $\varepsilon \to 0^+$ and whether
  blow-up is intrinsic to trapping/redshift or an artifact of the chosen stability topology.
implications: Would bridge ordinary Kerr stability to extremal dynamics and sharpen what actually fails as $\kappa \to 0$.
