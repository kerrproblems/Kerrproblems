id: K-506
title: High-frequency Kerr quasinormal-mode laws with explicit remainder bounds
short_title: High-frequency QNMs on Kerr — explicit remainders
cluster: spectral-scattering
theorem_status: open
problem_type: quantitative_sharpening
maturity: mostly_scoped
evidence_level: primary_refs_present
verification_state: imported_unverified
priority: normal
summary: >-
  Prove semiclassical quantization laws for QNM frequencies on fixed subextremal Kerr with explicit
  remainder bounds in frequency and in $(M,a)$; “explicit remainder” means stated inverse-polynomial or
  exponential-small error terms, not formal series alone.
problem_statement: >-
  Fix a compact subextremal parameter window for $(M,a)$ and a high-frequency regime $|\omega|\to\infty$
  along a chosen QNM branch. Prove an asymptotic law $\omega_n = f(n;M,a) + R_n(M,a)$ with **explicit**
  bounds on $R_n$ (rate in $n$, uniformity in $(M,a)$, and dependence on spin of the perturbing field).
  Extensions to an agreed near-Kerr class should be stated as separate theorems with modified remainders.
statement: >-
  Fix a compact subextremal parameter window for $(M,a)$ and a high-frequency regime $|\omega|\to\infty$
  along a chosen QNM branch. Prove an asymptotic law $\omega_n = f(n;M,a) + R_n(M,a)$ with **explicit**
  bounds on $R_n$ (rate in $n$, uniformity in $(M,a)$, and dependence on spin of the perturbing field).
  Extensions to an agreed near-Kerr class should be stated as separate theorems with modified remainders.
why_it_matters: >-
  Connects rigorous spectral theory with asymptotic formulas used in ringdown interpretation.
scope:
  background: Linearized Teukolsky/master equations on exact Kerr (first target); near-Kerr only if hypotheses
    are added.
  equation_type: Spectral/non-selfadjoint operator theory for separated ODEs or coupled systems.
  linearity: Linearized fields on a fixed background.
  regularity: Analytic/microlocal hypotheses standard in semiclassical scattering on Kerr.
  parameter_regime: >-
    **Fixed subextremal** $(M,a)$ in compact sets; near-extremal limits require separate scaling assumptions
    stated explicitly.
  asymptotics: Asymptotically flat Kerr.
  gauge_or_formulation: Teukolsky vs RW gauge recorded; frequencies are gauge-invariant where claimed.
known_results:
  - statement: >-
      Asymptotic expansions for Schwarzschild QNM frequencies with explicit leading terms (Motl’s analytic
      derivation).
    regime: Schwarzschild (non-rotating) background.
    significance: >-
      Model for what “explicit asymptotic law” means; Kerr extension with remainders is strictly harder.
remaining_gap: >-
  Kerr analogues with **uniform** remainder estimates in $(M,a)$ for high-frequency branches, and extension
  statements to near-Kerr if desired.
status_explanation: >-
  Classified as a quantitative spectral problem; not a new qualitative existence conjecture for QNMs.
math_required: >-
  Semiclassical analysis; phase-integral methods; microlocal analysis near trapped sets; spectral theory of
  non-selfadjoint operators.
completion_criteria: >-
  Bounds $| \omega_n - f(n;M,a) | \le \cdots$ with explicit rates and domains of validity.
implications: >-
  Sharpens inverse-spectral programs (cf. K-507) and scattering-phase intuition.
