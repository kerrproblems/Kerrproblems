id: K-004
title: Peeling and polyhomogeneous expansions at null infinity for nonlinear near-Kerr evolutions
short_title: Peeling / polyhomogeneity at $\mathscr{I}^+$ for near-Kerr
cluster: exterior-stability
theorem_status: open
problem_type: classical_frontier
maturity: well_scoped
evidence_level: primary_refs_present
verification_state: imported_unverified
priority: normal
summary: >-
  Establish sharp asymptotic (peeling-type or polyhomogeneous) expansions at future null infinity for
  solutions of the nonlinear vacuum Einstein equations arising from near-Kerr data.
problem_statement: >-
  Prove a sharp asymptotic expansion for curvature and connection coefficients at future null infinity
  ($\mathscr{I}^+$) for nonlinear vacuum evolutions starting from initial data sufficiently close to a Kerr
  slice in an asymptotically flat setting—specifying the expansion order, gauge hypotheses, leading
  coefficients as functionals of data, and rigorous remainder bounds appropriate to the nonlinear problem.
statement: >-
  Prove a sharp asymptotic expansion for curvature and connection coefficients at future null infinity
  ($\mathscr{I}^+$) for nonlinear vacuum evolutions starting from initial data sufficiently close to a Kerr
  slice in an asymptotically flat setting—specifying the expansion order, gauge hypotheses, leading
  coefficients as functionals of data, and rigorous remainder bounds appropriate to the nonlinear problem.
why_it_matters: >-
  Decay estimates alone do not pin down the fine radiation field; peeling and polyhomogeneous structure
  encode BMS charges, memory, and compatibility with scattering formulations at null infinity.
scope:
  background: Asymptotically flat vacuum general relativity; global nonlinear development from Cauchy data.
  equation_type: Nonlinear vacuum Einstein equations (full Einstein, not a linearized model on fixed Kerr).
  linearity: Nonlinear near-Kerr evolutions; comparison to linearized null-asymptotics is context only.
  regularity: Polyhomogeneous or smooth-compactified formulations as in modern null-infinity analysis.
  parameter_regime: >-
    Near subextremal Kerr in mass/angular momentum; the open question is the nonlinear map from data to
    asymptotic coefficients, not the leading linearized mode on fixed Kerr alone.
  asymptotics: Asymptotically flat with future null infinity in the usual sense of causal completeness toward $\mathscr{I}^+$.
  gauge_or_formulation: >-
    Expansion should be stated in a Bondi or conformal gauge class compatible with the nonlinear stability
    framework (not a purely formal expansion without remainder control).
known_results:
  - statement: >-
      Nonlinear stability of Minkowski space is established with **polyhomogeneous** expansions at null infinity (Hintz–Vasy),
      giving a rigorous template for sharp $\mathscr{I}^+$ asymptotics in vacuum GR.
    regime: Nonlinear vacuum near Minkowski.
    significance: Closest nonlinear peeling/polyhomogeneity analogue; near-Kerr remains to replicate that package.
  - statement: >-
      Klainerman–Szeftel prove nonlinear stability of Kerr for sufficiently small $|a|/M$, supplying a global Cauchy
      theory compatible in principle with null-infinity questions—but without a packaged polyhomogeneous peeling theorem
      for near-Kerr data.
    regime: Nonlinear vacuum, small angular momentum per unit mass.
    significance: Natural function spaces/bootstrap within which a future peeling theorem would need to be stated.
  - statement: >-
      Linearized Teukolsky/wave decay on fixed subextremal Kerr is highly developed; comparing nonlinear near-Kerr
      radiation to linearized peeling exponents is informative but not logically sufficient.
    regime: Linearized fields on exact Kerr.
    significance: Separates what is known pointwise/in weighted norms from a nonlinear expansion with remainder control.
remaining_gap: >-
  Provide a theorem-level polyhomogeneous or peeling-compatible expansion with remainder estimates for
  solutions controlled by the nonlinear stability program (or an alternative global Cauchy theory), not
  only for Minkowski or linearized models.
status_explanation: >-
  Open: nonlinear near-Kerr peeling/polyhomogeneity is not packaged here as a single proved theorem.
math_required: >-
  Null foliation geometry; transport equations; conformal compactification; weighted regularity along null
  hypersurfaces; b-analysis / polyhomogeneous calculus where applicable.
completion_criteria: >-
  A complete answer must provide the expansion order, the gauge class, the leading coefficients as
  functionals of data, and rigorous remainder bounds uniform for the stated class of near-Kerr data.
implications: >-
  Clarifies radiation memory, asymptotic charges, and compatibility between nonlinear stability and
  scattering/BMS-based descriptions.
