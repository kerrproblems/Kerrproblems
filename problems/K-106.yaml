id: K-106
title: Genericity of lower bounds for linearized-gravity interior instability
cluster: interior-scc
status: open
statement: Prove that the nontrivial lower-bound assumptions appearing in linearized-gravity blue-shift instability results are generic for exterior initial data.
math_required: Linearized-gravity scattering; horizon charges; genericity arguments in infinite-dimensional data spaces.
why_it_matters: Instability theorems are strongest when their hypotheses are shown to hold for open dense or full-measure sets of data.
completion_criteria: A complete answer must specify the data topology and prove generic nonvanishing of the instability-triggering quantity.
implications: Would turn conditional interior blow-up statements into genuinely generic ones.
