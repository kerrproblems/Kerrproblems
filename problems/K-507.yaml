summary: >-
  Finite-data inverse resonance recovery of Kerr parameters
problem_statement: >-
  From a finite set of observed quasinormal frequencies (with stated error bars) associated to a subextremal Kerr
  background, derive stability estimates for $(M,a)$ and quantify when uniqueness fails (e.g. isospectral ambiguities).
statement: >-
  From a finite set of observed quasinormal frequencies (with stated error bars) associated to a subextremal Kerr
  background, derive stability estimates for $(M,a)$ and quantify when uniqueness fails (e.g. isospectral ambiguities).
why_it_matters: Clarifies what mathematical inverse problems can and cannot justify for “spectroscopy” claims.
scope:
  background: Asymptotically flat four-dimensional general relativity unless the statement specifies otherwise.
  equation_type: "PDE level: inverse-problem, spectral-operator."
  linearity: Primarily stationary or linearized reductions unless the statement says otherwise.
  regularity: Smooth / Sobolev classes as in the problem statement; tighten when citing a specific theorem.
  parameter_regime: >-
    Subextremal Kerr (or Kerr–de Sitter where tagged); spectral parameters $(l,m)$ and frequency $ω$ regimes as in cited
    microlocal frameworks.
  asymptotics: asymptotically-flat
  gauge_or_formulation: >-
    State gauge/fixing class compatible with cited stability or interior programs (e.g. generalized harmonic,
    double-null interior charts).
known_results:
  - statement: >-
      Microlocal/resolvent frameworks yield decay and mode stability for waves on exact Kerr and Kerr–de Sitter under
      stated spectral assumptions.
    regime: Linear waves; fixed background.
    significance: Standard input for QNM expansions and superradiance discussions.
  - statement: Nonlinear Kerr stability is proved in a small-$|a|/M$ vacuum window (Klainerman–Szeftel).
    regime: Nonlinear vacuum, restricted parameters.
    significance: Closest nonlinear analogue for exterior stability conjectures.
  - statement: >-
      Complete QNM expansion as a spectral representation (including branch cuts) for Kerr remains an open mathematical
      framework problem.
    regime: Spectral theory on Kerr.
    significance: Distinguishes partial mode stability from full expansion/completeness.
remaining_gap: >-
