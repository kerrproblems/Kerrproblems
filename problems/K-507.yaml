summary: Finite-data inverse resonance recovery of Kerr parameters
problem_statement: >-
  From a finite set of observed quasinormal frequencies (with stated error bars) associated to a
  subextremal Kerr background, derive stability estimates for $(M,a)$ and quantify when uniqueness
  fails (e.g. isospectral ambiguities).
