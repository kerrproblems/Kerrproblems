math_required: >-
  Coupled hyperbolic systems; gravito-electromagnetic gauge fixing; Teukolsky-type equations with coupling; conserved
  fluxes for charge and angular momentum.
completion_criteria: >-
  A complete answer must identify the final stationary family, derive quantitative decay for the coupled fields, and
  prove orbital stability in a precise topology.
implications: Would open a path toward the full Kerr–Newman stability program.
