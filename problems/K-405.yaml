problem_statement: Determine whether scattering data for a natural field equation uniquely and stably determine the Kerr mass and spin.
statement: Determine whether scattering data for a natural field equation uniquely and stably determine the Kerr mass and spin.
why_it_matters: The forward scattering map on Kerr is rich enough that one expects inverse geometric information to be hidden in it.
