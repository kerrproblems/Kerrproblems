id: K-012
title: Low-regularity Kerr stability threshold
cluster: exterior-stability
status: open
statement: Find the minimal differentiability and asymptotic-flatness assumptions
  under which a Kerr stability theorem can hold.
math_required: Low-regularity hyperbolic PDE; rough wave gauges; bilinear and null-structure
  estimates under weak decay; weighted Sobolev spaces.
why_it_matters: Current high-regularity proofs are powerful but not obviously close
  to the true threshold.
completion_criteria: A complete answer must give a stability theorem at explicit regularity
  N and falloff δ, or produce a sharp obstruction below that threshold.
implications: Would reveal how robust the Kerr stability mechanism really is.
