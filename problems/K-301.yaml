id: K-301
title: Global smooth Kerr uniqueness without analyticity
short_title: Smooth stationary uniqueness → Kerr (no analyticity)
cluster: rigidity-uniqueness
theorem_status: partial
problem_type: classical_frontier
maturity: well_scoped
evidence_level: primary_refs_present
verification_state: verified_recently
priority: high
summary: >-
  Show any smooth stationary asymptotically flat vacuum black-hole exterior satisfying standard hypotheses is
  Kerr; perturbative/near-Kerr rigidity exists, but global smooth uniqueness without analyticity remains open.
problem_statement: >-
  Prove that any smooth, stationary, asymptotically flat vacuum black-hole exterior with a nondegenerate
  connected event horizon (and standard asymptotic/axisymmetry hypotheses as in the cited rigidity
  literature) is isometric to a Kerr exterior—without assuming real-analyticity of the metric.
statement: >-
  Prove that any smooth, stationary, asymptotically flat vacuum black-hole exterior with a nondegenerate
  connected event horizon (and standard asymptotic/axisymmetry hypotheses as in the cited rigidity
  literature) is isometric to a Kerr exterior—without assuming real-analyticity of the metric.
why_it_matters: >-
  Stationary uniqueness is the equilibrium counterpart to dynamical Kerr stability; removing analyticity
  matches the natural smooth category for PDE.
scope:
  background: >-
    Four-dimensional Einstein vacuum, stationary Killing field, asymptotically flat ends, nondegenerate
    horizon (standard uniqueness hypotheses—sharpen as in references).
  equation_type: Stationary reduction of vacuum Einstein; elliptic-hyperbolic coupled systems.
  linearity: Stationary (elliptic-type) problem, not a time-evolution claim.
  regularity: Smooth ($C^\infty$) or high Sobolev—must match the uniqueness program cited.
  parameter_regime: Subextremal Kerr moduli $(M,a)$ as the target classification.
  asymptotics: Asymptotically flat with stated decay on the stationary slices.
  gauge_or_formulation: Stationary coordinates / maximal-isothermal gauges as in rigidity proofs.
known_results:
  - statement: >-
      Classical uniqueness of Kerr among analytic stationary asymptotically flat vacuum black holes
      (Carter–Robinson–Mazur line; see survey).
    regime: Analytic stationary vacuum.
    significance: >-
      Qualitative uniqueness is classical in the analytic category; the open issue is lowering regularity.
  - statement: >-
      Partial results toward uniqueness without analyticity via unique continuation and perturbative rigidity
      (see e.g. Alexakis–Ionescu–Klainerman program).
    regime: Smooth/near-Schwarzschild or structured perturbative regimes as in the paper.
    significance: >-
      Shows nontrivial progress but does not close the global smooth statement as commonly formulated.
remaining_gap: >-
  A global theorem matching the smooth, asymptotically flat, stationary vacuum black-hole exterior
  hypotheses without embedding in an analytic class.
status_explanation: >-
  Partial: strong classical theorems exist under analyticity or in structured perturbative regimes; the
  sharp global smooth statement remains open.
math_required: >-
  Rigidity theory; Carleman unique continuation; stationary reduction; horizon geometry; elliptic-hyperbolic
  coupled systems.
completion_criteria: >-
  State a sharp hypothesis set and prove global isometry to Kerr in the smooth category.
implications: >-
  Completes the classical uniqueness story in the physically natural smooth setting.
difficulty: 3
