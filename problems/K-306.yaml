id: K-306
title: Hidden symmetries and approximate Carter-type operators under metric perturbation
short_title: Approximate hidden symmetries near Kerr
cluster: rigidity-uniqueness
theorem_status: open
problem_type: quantitative_sharpening
maturity: mostly_scoped
evidence_level: primary_refs_present
verification_state: imported_unverified
priority: normal
summary: >-
  Decide whether near-Kerr metrics admit controlled approximate symmetry operators usable like Carter’s
  constants—not the same question as photon-region spectral geometry (K-504) or Killing–Yano stability
  (K-508).
problem_statement: >-
  Determine whether vacuum spacetimes sufficiently close to Kerr admit tensors or differential operators that
  (i) approximately commute with the wave operator or geodesic Hamiltonian in a quantitative sense, and
  (ii) reproduce enough of the Carter commutator algebra to sharpen PDE estimates—either construct them with
  explicit error bounds or prove a no-go theorem.
statement: >-
  Determine whether vacuum spacetimes sufficiently close to Kerr admit tensors or differential operators that
  (i) approximately commute with the wave operator or geodesic Hamiltonian in a quantitative sense, and
  (ii) reproduce enough of the Carter commutator algebra to sharpen PDE estimates—either construct them with
  explicit error bounds or prove a no-go theorem.
why_it_matters: >-
  Kerr’s integrable structure underpins many analytic tools; the open issue is whether a useful remnant
  survives under perturbation of the metric itself.
scope:
  background: Near-Kerr vacuum spacetimes (not fixed Kerr linearization only).
  equation_type: Full vacuum Einstein constraints coupled with operator estimates on the perturbed geometry.
  linearity: >-
    Question is about operators on the perturbed spacetime; linearized modes on fixed Kerr are only
    motivational.
  regularity: Smooth or high Sobolev metrics in a neighborhood of Kerr.
  parameter_regime: Smallness of Kerr distance in a stated topology.
  asymptotics: Asymptotically flat near-Kerr context as in stability/rigidity discussions.
  gauge_or_formulation: Operator definitions must be gauge-coherent or gauge-fixed.
known_results:
  - statement: >-
      On **exact** Kerr, Carter-type quadratic conserved operators and separability for $\Box_g$ are classical; this is the
      algebraic benchmark any perturbative remnant must be compared against.
    regime: Exact Kerr; geodesic and scalar wave operators.
    significance: Establishes what “hidden symmetry” means at the integrable level before discussing near-Kerr remnants.
  - statement: >-
      Killing tensor / hidden-symmetry structures are rigid in highly symmetric settings; the near-Kerr question is
      whether **approximate** commutators with controlled errors exist in open sets of metrics.
    regime: Rigidity of tensors on symmetric backgrounds; perturbation theory context.
    significance: Explains why the problem is genuinely about **stability of integrability**, not a restatement of Carter.
  - statement: >-
      Photon-region spectral geometry (K-504) and approximate Killing–Yano stability (K-508) are sibling questions but
      target different geometric objects than general Carter-type operator algebras.
    regime: Near-Kerr geometry; separate entry scopes.
    significance: Prevents duplicating those problems while keeping operator-algebra focus here.
remaining_gap: >-
  Construct approximate operators with uniform estimates or obstruct them with a sharp theorem.
status_explanation: >-
  Distinct from K-504 (focus: photon shell / null geodesic locus under perturbation) and K-508 (focus:
  approximate Killing–Yano 2-forms). This entry targets Carter-type operator algebras for PDEs.
math_required: >-
  Killing tensors; Killing–Yano structures; perturbation of integrable systems; commutator estimates for PDEs.
completion_criteria: >-
  Either quantitative construction with error control or a rigorous no-go under explicit hypotheses.
implications: >-
  Determines whether Kerr’s separability is a stable analytic feature beyond exact symmetry.
