id: K-308
title: 'Rigidity and uniqueness with matter: full Kerr–Newman regime'
short_title: Kerr–Newman stationary uniqueness (full regime)
cluster: rigidity-uniqueness
theorem_status: partial
problem_type: classical_frontier
maturity: mostly_scoped
evidence_level: primary_refs_present
verification_state: verified_recently
priority: normal
summary: >-
  Complete stationary uniqueness/rigidity for Kerr–Newman without smallness caveats; partial linearized
  exterior progress exists (cf. K-008), but global stationary uniqueness in the smooth category remains
  incomplete.
problem_statement: >-
  Prove the full stationary uniqueness and perturbative rigidity theory for asymptotically flat
  Einstein–Maxwell black-hole solutions in the subextremal Kerr–Newman class—without small-charge or
  slow-rotation restrictions once the sharp theorem is available.
statement: >-
  Prove the full stationary uniqueness and perturbative rigidity theory for asymptotically flat
  Einstein–Maxwell black-hole solutions in the subextremal Kerr–Newman class—without small-charge or
  slow-rotation restrictions once the sharp theorem is available.
why_it_matters: >-
  Charged rotating solutions are physically central; their rigidity theory lags the vacuum Carter–Robinson
  picture in generality.
scope:
  background: Stationary Einstein–Maxwell, asymptotically flat, subextremal Kerr–Newman as target family.
  equation_type: Stationary coupled elliptic-type reduction; EM gauge issues included.
  linearity: Stationary nonlinear coupled system.
  regularity: Smooth / high Sobolev as in rigidity programs.
  parameter_regime: Full subextremal $(M,a,Q)$ range is the goal; partial results may cover restricted sets.
  asymptotics: Asymptotically flat.
  gauge_or_formulation: Lorenz / generalized wave-map gauges as in linearized stability literature.
known_results:
  - statement: >-
      Linearized decay/stability for weakly charged, slowly rotating Kerr–Newman (partial exterior linear
      result).
    regime: Linearized Einstein–Maxwell as in arXiv:2301.08557.
    significance: >-
      Partial progress on dynamics; stationary uniqueness is a distinct stationary elliptic problem.
remaining_gap: >-
  Global smooth stationary uniqueness/rigidity matching vacuum rigidity strength across parameters.
status_explanation: >-
  Partial: coupled linearized results exist; full stationary uniqueness without smallness remains open.
math_required: >-
  Einstein–Maxwell stationary reduction; coupled invariant tensors; horizon regularity; unique continuation.
completion_criteria: >-
  Sharp hypothesis theorem classifying stationary solutions as Kerr–Newman in the smooth category.
implications: >-
  Completes charged rotating rigidity parallel to vacuum Kerr uniqueness.
