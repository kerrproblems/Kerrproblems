math_required: Price-law asymptotics; transport into the interior; threshold Sobolev estimates; logarithmic corrections.
completion_criteria: A complete answer must prove both directions of the threshold and exhibit sharpness by examples or counterexamples.
implications: Would turn SCC for Kerr into a threshold phenomenon tied directly to exterior decay.
