problem_statement: >-
  Identify the exact exterior decay rate along the event horizon that separates weaker extendibility from stronger
  blow-up at the Cauchy horizon.
statement: >-
  Identify the exact exterior decay rate along the event horizon that separates weaker extendibility from stronger
  blow-up at the Cauchy horizon.
why_it_matters: Interior regularity is driven by exterior tails, so there should be a sharp threshold law.
scope:
  background: >-
    Asymptotically flat four-dimensional general relativity unless the statement specifies otherwise. Cauchy horizon /
    interior regularity formulations of strong cosmic censorship are in play; distinguish $C^0$ vs higher regularity
    notions.
  equation_type: "PDE level: full-einstein."
  linearity: Includes or emphasizes nonlinear dynamics.
  regularity: State intended regularity class for extensions across horizons explicitly (e.g. $C^0$, Lipschitz, $C^2$).
  parameter_regime: >-
    Subextremal Kerr interior up to Cauchy horizons; specify SCC regularity class ($C^0$, Lipschitz, $C^k$) in the
    theorem.
  asymptotics: asymptotically-flat
  gauge_or_formulation: >-
    State gauge/fixing class compatible with cited stability or interior programs (e.g. generalized harmonic,
    double-null interior charts).
known_results:
  - statement: >-
      $C^0$-extendibility and weak regularity across Cauchy horizons are understood in substantial $Lambda=0$ vacuum
      settings (Dafermos–Luk program); higher regularity and $Lambda>0$ charged models require separate hypotheses.
    regime: Dynamical vacuum near Kerr, $Lambda=0$ baseline; contrast with $Lambda>0$ scalar scans.
    significance: Sets what “partial” interior control means before claiming generic blow-up or extendibility.
  - statement: >-
      Linear scalar and Teukolsky-type decay on fixed subextremal Kerr exteriors is highly developed and feeds
      conditional interior instability heuristics.
    regime: Linearized fields on exact Kerr/Kerr–Newman.
    significance: Supplies quantitative decay exponents used in bridge hypotheses to inner horizons.
  - statement: >-
      Polyhomogeneous/null-infinity technology exists for nonlinear Minkowski and some linearized Kerr contexts; sharp
      nonlinear near-Kerr peeling is not packaged as one theorem.
    regime: Null infinity / linearized models.
    significance: Separates radiation asymptotics from interior SCC targets.
remaining_gap: A complete answer must prove both directions of the threshold and exhibit sharpness by examples or counterexamples.
