summary: >-
  Horizon-data rigidity and effective reconstruction of Kerr parameters
problem_statement: >-
  From a minimal package of intrinsic data on a cross-section of a stationary event horizon (e.g. induced metric,
  expansion/shear class, or spin coefficients restricted to the horizon), derive stability estimates that determine mass
  and angular momentum parameters of the ambient Kerr solution within explicit error bounds.
statement: >-
  From a minimal package of intrinsic data on a cross-section of a stationary event horizon (e.g. induced metric,
  expansion/shear class, or spin coefficients restricted to the horizon), derive stability estimates that determine mass
  and angular momentum parameters of the ambient Kerr solution within explicit error bounds.
why_it_matters: >-
  Connects horizon observables (as idealized in mathematical relativity) to uniqueness parameters without requiring full
  spacetime knowledge.
scope:
  background: Asymptotically flat four-dimensional general relativity unless the statement specifies otherwise.
  equation_type: "PDE level: stationary-reduction, inverse-problem."
  linearity: Primarily stationary or linearized reductions unless the statement says otherwise.
  regularity: Smooth / Sobolev classes as in the problem statement; tighten when citing a specific theorem.
  parameter_regime: >-
    Subextremal Kerr moduli $|a|<M$ (or stated KN/KdS extension); smallness measured in the stability topology on Cauchy
    data.
  asymptotics: asymptotically-flat
  gauge_or_formulation: >-
    State gauge/fixing class compatible with cited stability or interior programs (e.g. generalized harmonic,
    double-null interior charts).
known_results:
  - statement: >-
      Analytic stationary uniqueness theorems identify Kerr in the asymptotically flat vacuum class
      (Carter–Robinson–Mazur line).
    regime: Real-analytic stationary vacuum.
    significance: Classical baseline; smooth non-analytic uniqueness remains the sharp open gap for many formulations.
  - statement: >-
      Near-Kerr perturbative rigidity and Carter-type structures are studied in separability and hidden-symmetry
      programs.
    regime: Perturbations of Kerr; operator commutators.
    significance: Context for approximate operators and photon-region stability questions.
  - statement: >-
      Ernst reduction and harmonic-map formulations package stationary axisymmetric vacuum equations; sharp global
      uniqueness domains are formulation-dependent.
    regime: 2D elliptic reductions.
    significance: Explains why Ernst-domain questions must pin boundary data and function classes.
remaining_gap: >-
  A precise theorem: horizon data in stated function classes implies closeness to Kerr horizon data and recovers $(M,a)$
  modulo gauge with quantitative bounds.
status_explanation: >-
  Entry imported without two independent bibliographic pointers in this repository; treat theorem-level claims as
  unverified here.
math_required: >-
  Isolated horizons; Newman–Penrose spin coefficients; geometric analysis on 2-spheres; inverse problems for spectral or
  curvature invariants on compact surfaces.
completion_criteria: >-
  A precise theorem: horizon data in stated function classes implies closeness to Kerr horizon data and recovers $(M,a)$
  modulo gauge with quantitative bounds.
implications: Feeds both uniqueness theory and idealized “black hole spectroscopy from horizons” mathematics.
