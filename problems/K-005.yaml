math_required: >-
  Sharp $r^p$ hierarchies; resonance/low-frequency analysis; nonlinear bootstrap estimates; Bianchi equations;
  asymptotic mode coupling.
completion_criteria: >-
  A complete answer must state exact exponents, identify generic nonvanishing leading coefficients, and prove matching
  upper and lower bounds.
implications: Would connect linear tail predictions to the full Einstein dynamics and feed directly into SCC formulations.
