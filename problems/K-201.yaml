summary: >-
  Nonlinear codimension-1 stability of extremal Kerr with horizon hair
problem_statement: >-
  Prove that a codimension-1 family of perturbations of extremal Kerr stays globally close to an extremal endstate while
  exhibiting Aretakis-type horizon growth in transversal derivatives.
statement: >-
  Prove that a codimension-1 family of perturbations of extremal Kerr stays globally close to an extremal endstate while
  exhibiting Aretakis-type horizon growth in transversal derivatives.
why_it_matters: Extremal Kerr is expected to be stable only in a codimension-1 sense, not in the same way as subextremal Kerr.
scope:
  background: Asymptotically flat four-dimensional general relativity unless the statement specifies otherwise.
  equation_type: "PDE level: full-einstein."
  linearity: Primarily stationary or linearized reductions unless the statement says otherwise.
  regularity: Smooth / Sobolev classes as in the problem statement; tighten when citing a specific theorem.
  parameter_regime: >-
    Extremal or near-extremal Kerr-type parameters; quantify smallness of $|1-|a|/M|$ or surface gravity $κ$ in any
    claim.
  asymptotics: asymptotically-flat
  gauge_or_formulation: >-
    State gauge/fixing class compatible with cited stability or interior programs (e.g. generalized harmonic,
    double-null interior charts).
known_results:
  - statement: >-
      Aretakis instability and conserved charges on extremal horizons are established for scalar test fields; spin-2 and
      nonlinear extremal dynamics are much less complete.
    regime: Extremal horizons; often linear scalar.
    significance: Shows qualitative difference from subextremal decay.
  - statement: Subextremal nonlinear Kerr stability is known for small $|a|/M$; uniformity as $|a|\to M$ is not a corollary.
    regime: Nonlinear vacuum, restricted subextremal window.
    significance: Separates near-extremal uniformity from existing subextremal theorems.
  - statement: Near-horizon NHEK limits capture extremal mode structure but matching to global Kerr is an open PDE bridge.
    regime: Near-horizon scaling limits.
    significance: Clarifies what NHEK analyses do and do not imply globally.
remaining_gap: >-
  A complete answer must identify the stable manifold, prove global exterior control, describe the final extremal
  parameters, and quantify the horizon growth.
status_explanation: >-
  Entry imported without two independent bibliographic pointers in this repository; treat theorem-level claims as
  unverified here.
math_required: >-
  Degenerate horizon geometry; conserved charges; nonlinear modulation with reduced parameter freedom; null structure at
  $\kappa = 0$.
completion_criteria: >-
  A complete answer must identify the stable manifold, prove global exterior control, describe the final extremal
  parameters, and quantify the horizon growth.
implications: Would define the correct nonlinear stability statement for extremal rotating black holes.
