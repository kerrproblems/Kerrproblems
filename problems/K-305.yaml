known_results:
  - statement: >-
      Analytic stationary uniqueness theorems identify Kerr in the asymptotically flat vacuum class
      (Carter–Robinson–Mazur line).
    regime: Real-analytic stationary vacuum.
    significance: Classical baseline; smooth non-analytic uniqueness remains the sharp open gap for many formulations.
  - statement: >-
      Near-Kerr perturbative rigidity and Carter-type structures are studied in separability and hidden-symmetry
      programs.
    regime: Perturbations of Kerr; operator commutators.
    significance: Context for approximate operators and photon-region stability questions.
  - statement: >-
      Ernst reduction and harmonic-map formulations package stationary axisymmetric vacuum equations; sharp global
      uniqueness domains are formulation-dependent.
    regime: 2D elliptic reductions.
    significance: Explains why Ernst-domain questions must pin boundary data and function classes.
remaining_gap: A complete answer must identify intrinsic horizon data and prove a local or global reconstruction theorem to Kerr.
