id: K-304
title: Near-Kerr rigidity with computable geometric constants
short_title: Effective near-Kerr → Kerr (computable constants)
cluster: rigidity-uniqueness
theorem_status: open
problem_type: quantitative_sharpening
maturity: well_scoped
evidence_level: primary_refs_present
verification_state: imported_unverified
priority: normal
summary: >-
  Upgrade qualitative near-Kerr uniqueness/rigidity into explicit geometric inequalities with computable
  constants; the qualitative rigidity technology exists, the effective bounds do not.
problem_statement: >-
  Upgrade perturbative or near-Kerr uniqueness theorems for stationary vacuum asymptotically flat
  black-hole exteriors so that hypotheses are checkable geometric inequalities (tetrad or curvature norms)
  with explicit constants controlling closeness to an exact Kerr metric—not only asymptotic “smallness in
  implicit norms.”
statement: >-
  Upgrade perturbative or near-Kerr uniqueness theorems for stationary vacuum asymptotically flat
  black-hole exteriors so that hypotheses are checkable geometric inequalities (tetrad or curvature norms)
  with explicit constants controlling closeness to an exact Kerr metric—not only asymptotic “smallness in
  implicit norms.”
why_it_matters: >-
  Numerical relativity and inverse problems need constants, not only existence of a small neighborhood where
  rigidity holds.
scope:
  background: Stationary vacuum, asymptotically flat, near-Kerr in rigidity-theoretic sense.
  equation_type: Stationary Einstein vacuum reduction.
  linearity: Stationary nonlinear elliptic-type constraints; linearization may appear as a tool.
  regularity: Smooth or high Sobolev as in near-Kerr rigidity papers.
  parameter_regime: Smallness measured by explicit curvature or Mars–Simon-type tensors, not an abstract
    implicit topology.
  asymptotics: Asymptotically flat.
  gauge_or_formulation: >-
    Invariants (Mars–Simon, Weyl alignment) should be stated in a gauge-fixed form amenable to constants.
known_results:
  - statement: >-
      Qualitative rigidity and local uniqueness statements for near-Kerr stationary vacuum solutions under
      hypotheses used in the Mars/Simon tensor framework.
    regime: Stationary vacuum, asymptotically flat, near-Kerr.
    significance: >-
      Provides the qualitative theorem that quantitative sharpening aims to make effective.
remaining_gap: >-
  Replace “sufficiently small in an implicit norm” with finite, computable bounds linking invariant sizes to
  Kerr distance functionals.
status_explanation: >-
  Open as a quantitative / effective problem; not a separate classical conjecture from the existence of
  qualitative rigidity.
math_required: Perturbative uniqueness; unique continuation; invariant boundary data; effective estimates.
completion_criteria: >-
  Finite, computable conditions implying exact Kerrness with quantitative parameter control.
implications: >-
  Makes rigidity usable for analysis and numerical stability certificates.
