id: K-206
title: Extremal interior SCC and Cauchy-horizon regularity
cluster: extremal
status: open
statement: Determine the interior stability or instability picture for extremal Kerr
  and identify the correct extendibility threshold across its inner horizon structure.
math_required: Degenerate interior analysis; coupling of horizon and interior asymptotics;
  extremal transport estimates.
why_it_matters: The extremal interior is much less understood than the subextremal
  one and may not fit the usual weak-null-singularity paradigm.
completion_criteria: A complete answer must specify the relevant extremal horizon
  geometry, the extension class, and the precise blow-up or continuity mechanism.
implications: Would complete the extremal analogue of SCC.
