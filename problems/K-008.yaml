id: K-008
title: Full stability of asymptotically flat Kerr–Newman
cluster: exterior-stability
status: partial
statement: Prove linear and then nonlinear stability of the full subextremal Kerr–Newman family without small-charge or slow-rotation assumptions.
math_required: Non-selfadjoint spectral theory; coupled gravito-EM perturbation equations; physical-space energy estimates; nonlinear modulation of mass, charge, and spin.
why_it_matters: Kerr–Newman is the natural stationary Einstein–Maxwell black-hole family and a major benchmark after Kerr.
completion_criteria: A complete answer must treat the full subextremal parameter range $a^2+Q^2<M^2$ and produce decay to linearized or nonlinear Kerr–Newman modulo gauge and parameter shifts.
implications: Would give a coupled-field analogue of the Kerr stability theorem and reshape the Einstein–Maxwell scattering picture.
