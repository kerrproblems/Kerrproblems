id: K-008
title: Full asymptotically flat stability of the subextremal Kerr–Newman family
short_title: Full Kerr–Newman stability (Einstein–Maxwell)
cluster: exterior-stability
theorem_status: open
problem_type: classical_frontier
maturity: well_scoped
evidence_level: primary_refs_present
verification_state: verified_recently
priority: normal
summary: >-
  Prove linear and nonlinear stability for the full subextremal Kerr–Newman family; restricted linear
  results exist for weak charge and slow rotation, but the unrestricted coupled problem remains open.
problem_statement: >-
  Prove linear and then nonlinear asymptotic stability of the full subextremal Kerr–Newman family
  ($a^2+Q^2<M^2$ in standard parameters) under coupled Einstein–Maxwell dynamics in an asymptotically flat
  setting—without imposing small-charge or slow-rotation restrictions once a complete theorem is available.
statement: >-
  Prove linear and then nonlinear asymptotic stability of the full subextremal Kerr–Newman family
  ($a^2+Q^2<M^2$ in standard parameters) under coupled Einstein–Maxwell dynamics in an asymptotically flat
  setting—without imposing small-charge or slow-rotation restrictions once a complete theorem is available.
why_it_matters: >-
  Kerr–Newman is the natural stationary charged rotating family; settling its stability is the coupled-field
  analogue of vacuum Kerr stability.
scope:
  background: Four-dimensional Einstein–Maxwell, asymptotically flat, subextremal Kerr–Newman as reference.
  equation_type: Coupled Einstein–Maxwell (full nonlinear field equations).
  linearity: Target includes nonlinear stability; current partial results are linearized.
  regularity: Strong enough Sobolev/decay assumptions to close coupled estimates (as in cited linear work).
  parameter_regime: >-
    Eventual goal is the full subextremal range $a^2+Q^2<M^2$. Existing theorem-level linear results cover
    restricted windows (e.g. weak charge and slow rotation).
  asymptotics: Asymptotically flat.
  gauge_or_formulation: >-
    Lorenz / EM gauge and harmonic-type coordinates as in the linearized theory; nonlinear gauge choice is
    part of a complete theorem.
known_results:
  - statement: >-
      Linearized stability (decay to a linearized Kerr–Newman solution modulo gauge) for weakly charged,
      slowly rotating Kerr–Newman black holes.
    regime: Linearized Einstein–Maxwell, stated smallness regime of arXiv:2301.08557.
    significance: >-
      Confirms partial linearized control in an open subset of parameters; does not constitute full
      subextremal linear or any nonlinear theorem.
remaining_gap: >-
  Extend coupled linearized theory to the full subextremal parameter range and build a nonlinear modulated
  stability theorem comparable in scope to the vacuum Kerr program.
status_explanation: >-
  Marked “open” because the unrestricted subextremal Kerr–Newman statement is not proved. Partial progress
  refers only to restricted linearized regimes; the UI must not suggest the full problem is nearly solved.
math_required: >-
  Non-selfadjoint spectral theory; coupled gravito-EM perturbation equations; physical-space energy estimates;
  nonlinear modulation of mass, charge, and spin.
completion_criteria: >-
  Treat the full subextremal parameter range and produce decay to linearized or nonlinear Kerr–Newman modulo
  gauge and parameter shifts as claimed.
implications: >-
  Would give a coupled-field analogue of Kerr stability and reshape the Einstein–Maxwell scattering picture.
