fv_reason: >-
  Tensor norms and approximate closure identities can be formalized; global nonlinear stability of
  “almost Yano” fields remains broad.
progress_summary: >-
  Exact Killing–Yano tensors characterize Kerr among vacuum solutions in certain classes; approximate
  versions are used heuristically. No single obstruction/stability theorem is verified here. See
  references/TODO.
related_families_note: null
caution_note: null
statement: >-
  If a vacuum spacetime admits a tensor field whose Killing–Yano equation is small in an agreed
  $L^2$ or $C^0$ norm, must the metric be close to Kerr, or can one construct controlled counterexamples?
math_required: >-
  Two-forms; Killing–Yano equations; elliptic systems on Riemannian slices; perturbation theory of
  geometric PDE constraints.
why_it_matters: >-
  Hidden symmetry tensors underpin separability; their stability under perturbation reflects
  whether near-Kerr dynamics inherit integrable structure.
completion_criteria: >-
  Either a quantitative stability theorem toward Kerr or an explicit family of near-vacuum solutions
  with small Yano violation but large Kerr distance.
implications: >-
  Clarifies how much of Kerr’s algebra persists under nonlinear perturbation.
