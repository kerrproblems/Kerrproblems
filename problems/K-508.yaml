id: K-508
title: Stability or obstruction for approximate Killing–Yano tensors near Kerr
short_title: Approximate Killing–Yano fields near Kerr
cluster: rigidity-uniqueness
theorem_status: open
problem_type: quantitative_sharpening
maturity: well_scoped
evidence_level: primary_refs_present
verification_state: verified_recently
priority: normal
summary: >-
  If the Killing–Yano equation is small in an agreed tensor norm, must the metric be near Kerr, or can one
  build controlled counterexamples? Complements K-306 (Carter-type operators) with a 2-form/tensor PDE focus.
problem_statement: >-
  Consider vacuum spacetimes with a two-form $Y_{ab}$ whose Killing–Yano equation $\nabla_{(a}Y_{b)c}=0$ is
  small in an agreed $L^2$ or $C^0$ norm on a suitable spacelike slice or domain. Prove either (i) a
  quantitative stability statement toward Kerr with explicit bounds, or (ii) an explicit family of
  near-vacuum solutions with small Yano violation but large distance to Kerr in a stated topology.
statement: >-
  Consider vacuum spacetimes with a two-form $Y_{ab}$ whose Killing–Yano equation $\nabla_{(a}Y_{b)c}=0$ is
  small in an agreed $L^2$ or $C^0$ norm on a suitable spacelike slice or domain. Prove either (i) a
  quantitative stability statement toward Kerr with explicit bounds, or (ii) an explicit family of
  near-vacuum solutions with small Yano violation but large distance to Kerr in a stated topology.
why_it_matters: >-
  Killing–Yano tensors encode hidden symmetry; their stability under perturbation tests whether near-Kerr
  geometry inherits usable algebraic structure.
scope:
  background: Four-dimensional vacuum near Kerr; local or global domains as stated.
  equation_type: Geometric tensor PDE for $Y_{ab}$ coupled to vacuum Einstein constraints.
  linearity: Fully nonlinear metric perturbations; linearization may be a first step only.
  regularity: Elliptic systems on Riemannian slices; boundary conditions must be specified.
  parameter_regime: Small Yano defect measured in the chosen norm vs Kerr distance functional.
  asymptotics: Asymptotically flat if global statements are claimed.
  gauge_or_formulation: Tensor norms must be coordinate-invariant or gauge-fixed consistently.
known_results:
  - statement: >-
      Exact Killing–Yano structure and hidden symmetries on Kerr (classical).
    regime: Exact Kerr geometry.
    significance: >-
      Baseline “known qualitative” structure; this entry asks for **approximate** stability or obstruction.
remaining_gap: >-
  Quantitative theorem with either stability toward Kerr or sharp counterexamples.
status_explanation: >-
  Paired with K-306: K-306 emphasizes operator commutators / Carter constants; this entry emphasizes the
  Killing–Yano 2-form PDE itself.
math_required: >-
  Two-forms; Killing–Yano equations; elliptic systems on slices; perturbation theory of geometric PDE
  constraints.
completion_criteria: >-
  Either quantitative stability toward Kerr or explicit near-vacuum counterexamples with stated norms.
implications: >-
  Clarifies how much Kerr algebra persists under nonlinear perturbation.
