math_required: Degenerate vector-field method; zero-energy analysis; extremal Teukolsky theory; gauge-invariant reconstruction.
completion_criteria: >-
  A complete answer must separate decay away from the horizon from conserved or growing horizon quantities and handle
  gauge issues explicitly.
implications: Would become the linear backbone of extremal Kerr dynamics.
