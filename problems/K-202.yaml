id: K-202
title: Full linear theory for extremal Kerr (spin 2)
cluster: extremal
status: partial
statement: Develop a complete boundedness, decay, and instability theory for linearized
  vacuum Einstein perturbations of extremal Kerr.
math_required: Degenerate vector-field method; zero-energy analysis; extremal Teukolsky
  theory; gauge-invariant reconstruction.
why_it_matters: The linear theory is the mandatory first step before any nonlinear
  extremal theorem.
completion_criteria: A complete answer must separate decay away from the horizon from
  conserved or growing horizon quantities and handle gauge issues explicitly.
implications: Would become the linear backbone of extremal Kerr dynamics.
