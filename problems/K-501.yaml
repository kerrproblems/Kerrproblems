id: K-501
title: Quantitative Mars–Simon tensor gap for near-Kerr stationary vacuum data
short_title: Quantitative Mars–Simon gap (near-Kerr)
cluster: rigidity-uniqueness
theorem_status: open
problem_type: quantitative_sharpening
maturity: well_scoped
evidence_level: primary_refs_present
verification_state: imported_unverified
priority: normal
summary: >-
  Bound how far stationary vacuum data can deviate from Kerr before the Mars–Simon invariant package
  becomes quantitatively nonzero; complements exact vanishing characterizations.
problem_statement: >-
  Quantify, in a stated Sobolev or $C^k$ topology on stationary vacuum data, how small deviations from Kerr
  can be before the Mars–Simon tensor (or an agreed equivalent invariant package) is forced away from zero—i.e.
  a quantitative gap theorem complementing exact vanishing characterizations on Kerr.
statement: >-
  Quantify, in a stated Sobolev or $C^k$ topology on stationary vacuum data, how small deviations from Kerr
  can be before the Mars–Simon tensor (or an agreed equivalent invariant package) is forced away from zero—i.e.
  a quantitative gap theorem complementing exact vanishing characterizations on Kerr.
why_it_matters: >-
  Turns qualitative rigidity into a stability statement for curvature invariants used in geometric inverse
  problems.
scope:
  background: Four-dimensional stationary asymptotically flat vacuum near Kerr.
  equation_type: Stationary vacuum Einstein.
  linearity: Stationary nonlinear problem; estimates may linearize near Kerr.
  regularity: Sobolev or $C^k$ norms on metric/invariants as stated in the theorem.
  parameter_regime: Uniformity over compact subsets of subextremal $(M,a)$ if claiming uniform bounds.
  asymptotics: Asymptotically flat.
  gauge_or_formulation: Invariant tensor norms in a fixed gauge class suitable for global elliptic estimates.
known_results:
  - statement: >-
      Exact vanishing of the Mars–Simon package characterizes Kerr (local/global statements as in cited
      references).
    regime: Stationary vacuum, asymptotically flat.
    significance: >-
      Qualitative target; this entry asks for quantitative stability of the vanishing condition.
remaining_gap: >-
  Explicit bounds of the form “small invariant norm $\Rightarrow$ small Kerr distance” with computable
  constants.
status_explanation: >-
  Quantitative sharpening relative to classical Mars–Simon rigidity—not a new unrelated conjecture.
math_required: >-
  Four-dimensional Lorentz geometry; Newman–Penrose or orthonormal tensor calculus; uniqueness literature;
  stability of PDE constraints under perturbation.
completion_criteria: >-
  Theorem with explicit bounds relating a norm of Mars–Simon (or substitute) to a distance-to-Kerr functional.
implications: >-
  Sharpens uniqueness technology for inverse problems and numerical certification.
