progress_summary: >-
  Classical uniqueness frameworks use Mars–Simon-type tensors; quantitative stability of the
  vanishing condition under perturbation is not isolated as a single sharp theorem here. Partial
  progress exists in adjacent rigidity programs; see references/TODO for precise citations.
