statement: >-
  Quantify how small (in a stated Sobolev or $C^k$ topology on metric data) a deviation from Kerr can
  be before the Mars–Simon tensor (or an agreed equivalent invariant package) is forced away from
  zero—i.e. a quantitative “gap” theorem complementing exact vanishing characterizations.
math_required: >-
  Four-dimensional Lorentz geometry; Newman–Penrose or orthonormal tensor calculus; uniqueness
  literature for stationary vacuum black holes; stability of PDE constraints under perturbation.
why_it_matters: >-
  Turns qualitative rigidity into a stability statement for hidden-symmetry tensors, with
  implications for how near-Kerr data can be recognized from curvature invariants.
completion_criteria: >-
  A theorem with explicit bounds relating a norm of the Mars–Simon tensor (or substitute invariant)
  to a distance-to-Kerr functional, under hypotheses stated in a form checkable in coordinates or
  tetrad formalisms.
implications: >-
  Would sharpen uniqueness technology into a tool for geometric inverse problems and potentially for
  numerical stability certificates.
