why_it_matters: >-
  Observational ringdown analysis increasingly depends on knowing when linear mode models are justified and when
  nonlinear corrections matter.
scope:
  background: Asymptotically flat four-dimensional general relativity unless the statement specifies otherwise.
  equation_type: "PDE level: spectral-operator, full-einstein."
