statement: >-
  For the separated ODEs arising from Teukolsky or Regge–Wheeler–type reductions on Kerr, classify
  threshold resonant modes (zero-energy, algebraically special, or repeated-root regimes) with
  uniform bounds as parameters vary in compact subintervals of subextremality.
