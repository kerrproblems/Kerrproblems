id: K-505
title: Threshold phenomena in separated Teukolsky-type ODEs on Kerr (zero modes, algebraically special limits, superradiant edges)
short_title: Kerr separated ODEs — threshold classification
cluster: spectral-scattering
theorem_status: open
problem_type: quantitative_sharpening
maturity: mostly_scoped
evidence_level: primary_refs_present
verification_state: verified_recently
priority: normal
summary: >-
  Classify threshold behavior (zero-frequency modes, algebraically special / repeated-root regimes,
  superradiant frequency boundaries) for separated radial/angular ODEs on Kerr with uniform $(M,a)$ control.
problem_statement: >-
  For the separated ODEs arising from Teukolsky or Regge–Wheeler–type reductions on Kerr, classify threshold
  resonant phenomena including (i) **zero-frequency** limits affecting low-energy resolvents, (ii)
  **algebraically special / repeated-root** regimes in the radial ODE, and (iii) edges of the **superradiant**
  frequency window—each with uniform bounds as parameters vary in compact subintervals of subextremality.
  The catalog should be checkable mode-by-mode and include uniformity statements in $(M,a)$.
statement: >-
  For the separated ODEs arising from Teukolsky or Regge–Wheeler–type reductions on Kerr, classify threshold
  resonant phenomena including (i) **zero-frequency** limits affecting low-energy resolvents, (ii)
  **algebraically special / repeated-root** regimes in the radial ODE, and (iii) edges of the **superradiant**
  frequency window—each with uniform bounds as parameters vary in compact subintervals of subextremality.
  The catalog should be checkable mode-by-mode and include uniformity statements in $(M,a)$.
why_it_matters: >-
  Threshold modes control low-frequency resolvent behavior and appear in stability and scattering
  constructions.
scope:
  background: Exact Kerr or agreed near-Kerr ODE coefficients after separation.
  equation_type: Coupled radial/angular ODEs from spin-weighted master equations.
  linearity: Linearized field equations on a fixed background.
  regularity: Analytic coefficients in the ODE domain away from singular points; Frobenius analysis at singularities.
  parameter_regime: >-
    Compact subsets of subextremal $(M,a)$ excluding extremality unless a separate limit is explicitly
    formulated.
  asymptotics: Asymptotically flat Kerr boundary conditions encoded in the ODEs.
  gauge_or_formulation: Teukolsky vs RW–Zerilli gauge choices recorded explicitly when comparing thresholds.
known_results:
  - statement: >-
      Separation of the Teukolsky master equation into radial and angular ODEs on Kerr (classical derivation).
    regime: Linearized perturbations of exact Kerr.
    significance: >-
      Foundational ODE setup; this entry targets **uniform threshold classification**, not the original
      separation itself.
remaining_gap: >-
  Consolidated theorem catalog with proofs of uniformity and explicit handling of each threshold family named
  above.
status_explanation: >-
  “Threshold” is disambiguated on-page (zero-frequency / algebraic / superradiant edge); not a vague umbrella
  phrase.
math_required: >-
  ODE spectral theory; Frobenius methods; connection formulas; Teukolsky equations; asymptotic analysis of
  eigenvalue branches.
completion_criteria: >-
  Complete catalog with checkable mode-wise proofs and $(M,a)$ uniformity.
implications: >-
  Strengthens QNM and scattering foundations used across clusters.
