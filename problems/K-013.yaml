problem_statement: >-
  Prove a global theorem in which generic asymptotically flat vacuum data form a black hole and the exterior
  subsequently relaxes to Kerr with quantitative radiation control.
statement: >-
  Prove a global theorem in which generic asymptotically flat vacuum data form a black hole and the exterior
  subsequently relaxes to Kerr with quantitative radiation control.
why_it_matters: This would turn the standard numerical-relativity narrative into a theorem.
scope:
  background: Asymptotically flat four-dimensional general relativity unless the statement specifies otherwise.
  equation_type: "PDE level: full-einstein."
  linearity: Includes or emphasizes nonlinear dynamics.
  regularity: Smooth / Sobolev classes as in the problem statement; tighten when citing a specific theorem.
  parameter_regime: >-
    Subextremal Kerr moduli $|a|<M$ (or stated KN/KdS extension); smallness measured in the stability topology on Cauchy
    data.
  asymptotics: asymptotically-flat
  gauge_or_formulation: >-
    State gauge/fixing class compatible with cited stability or interior programs (e.g. generalized harmonic,
    double-null interior charts).
known_results:
  - statement: Nonlinear stability of vacuum Kerr is proved for sufficiently small $|a|/M$ (Klainerman–Szeftel).
    regime: Nonlinear Einstein vacuum, asymptotically flat, small angular momentum per unit mass.
    significance: Strongest unconditional nonlinear theorem toward the full subextremal conjecture.
  - statement: >-
      Linearized Teukolsky/wave decay and mode stability on fixed subextremal Kerr are developed in depth (microlocal
      and physical-space methods).
    regime: Linearized gravity and scalar waves on exact Kerr.
    significance: Standard toolbox; not equivalent to nonlinear stability for all parameters.
  - statement: >-
      Sharp Price-law exponents and nonlinear tail matching are understood in restricted settings (e.g. linearized
      models, Schwarzschild); sharp nonlinear Kerr curvature tails are not settled.
    regime: Late-time asymptotics; mixed linear vs nonlinear literature.
    significance: Locates what “sharp Price law” demands beyond integrated decay.
remaining_gap: >-
  A complete answer must specify an open class of initial data, prove black-hole formation, establish complete null
  infinity, and show quantitative Kerr asymptotics outside the hole.
status_explanation: >-
  Entry imported without two independent bibliographic pointers in this repository; treat theorem-level claims as
  unverified here.
math_required: Trapped-surface formation; global causal geometry; continuation criteria; matching formation and relaxation regimes.
completion_criteria: >-
  A complete answer must specify an open class of initial data, prove black-hole formation, establish complete null
  infinity, and show quantitative Kerr asymptotics outside the hole.
implications: Would unite collapse theory and Kerr stability into one coherent mathematical picture.
