id: K-503
title: Uniqueness questions for Carter-type symmetry operators on Kerr
short_title: Carter operator uniqueness (scoping variants)
cluster: rigidity-uniqueness
theorem_status: open
problem_type: formalization_target
maturity: mostly_scoped
evidence_level: primary_refs_present
verification_state: verified_recently
priority: low
summary: >-
  On **exact** subextremal Kerr, Carter’s fourth constant arises from a quadratic-in-momenta conserved quantity for
  geodesic flow (equivalently, a second-order symmetry operator for the massless scalar wave operator). The **core**
  problem pinned here is variant **(a)**: within an explicitly named class of smooth differential operators on
  $T^*M$—polynomial of degree $\le 2$ in momenta with coefficients depending only on position—classify operators that
  Poisson-commute with the geodesic Hamiltonian (or commute with $\Box_g$ on test functions) up to the trivial
  symmetries generated by energy and angular momentum. Variants (b) (modulo functions of commuting integrals) and (c)
  (approximate operators on perturbed metrics) are **out of scope for this ID** and should be tracked as separate
  entries if promoted.
problem_statement: >-
  Let $(M,g)$ be the exterior of subextremal Kerr in Boyer–Lindquist-type coordinates. Let $\mathcal{D}_{\le 2}$ denote
  the real vector space of smooth differential operators on scalars induced by real-valued functions on $T^*M$ that are
  polynomials of degree at most $2$ in fiber variables at each point. Determine whether every $D \in \mathcal{D}_{\le 2}$
  with $[D,\Box_g]=0$ (on compactly supported smooth functions) is a polynomial in $\{\partial_t,\partial_\varphi,\Box_g\}$
  with **constant** coefficients—or, if not, classify the finite-dimensional family of additional solutions. State and
  prove the analogous Hamiltonian/Poisson-commutator formulation for geodesic flow. (This is the sharp algebraic
  uniqueness question behind “hidden symmetry” on exact Kerr, before any perturbative extension.)
statement: >-
