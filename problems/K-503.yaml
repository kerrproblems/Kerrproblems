fv_reason: >-
  Separation constants and commuting operators admit algebraic characterizations in Kerr; suitable
  for formalizing operator identities and representation on eigenspaces.
progress_summary: >-
  Carter’s constant and separability are classical; a sharp uniqueness theorem for the symmetry
  operator in a stated functorial or spectral class is not recorded as settled on this site. See
  references/TODO.
related_families_note: null
caution_note: null
statement: >-
  Characterize the Carter constant as the unique (up to normalization and addition of functions of
  conserved quantities) second-order symmetry operator for geodesic or scalar wave motion on Kerr
  within a precise class of differential operators polynomial in momenta.
math_required: >-
  Symplectic geometry; Killing tensors; Carter’s theory; spectral theory on stationary backgrounds;
  separation of variables for wave operators.
why_it_matters: >-
  Explains why Kerr’s integrable structure is rigid rather than an accident of coordinates, with
  implications for perturbation theory.
completion_criteria: >-
  A uniqueness proof under explicit hypotheses on operator order, locality, and commutation with
  the Hamiltonian or wave operator.
implications: >-
  Would solidify the algebraic backbone of Kerr scattering and QNM separability programs.
