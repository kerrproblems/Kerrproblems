why_it_matters: >-
  Separability on Kerr is not accidental; pinning an operator-level uniqueness theorem clarifies what
  survives under perturbation (cf. K-306, K-508).
scope:
  background: Exact Kerr and, for variant (c), smooth perturbations; geodesic flow and/or scalar wave operator.
  equation_type: Hamiltonian/Wave-operator commutator algebra; finite-order differential operators on the phase space / spacetime.
  linearity: >-
    Exact algebraic commutator/Poisson identities on fixed Kerr; no approximate commutation in the primary statement.
  regularity: Smooth coefficients on the relevant bundles unless a weaker class is explicitly fixed.
  parameter_regime: Fixed subextremal Kerr parameters $|a|<M$; uniqueness is on the exact metric, not a neighborhood.
  asymptotics: Local / algebraic on Kerr; global issues only if explicitly posed.
  gauge_or_formulation: >-
    Operator classes must be specified (order, locality, polynomial momentum dependence) to avoid trivial
    reformulations.
known_results:
  - statement: >-
      Carter constructs an additional quadratic conserved quantity for geodesic motion on Kerr and the associated
      second-order symmetry operator commuting with $\Box_g$ (separability package).
    regime: Exact Kerr exterior; geodesic and scalar wave operators.
    significance: Existence of a nontrivial commuting operator beyond manifest symmetries; baseline for any uniqueness claim.
  - statement: >-
      Complete integrability of geodesic flow on Kerr is classical; finite-dimensional spaces of conserved polynomials of
      bounded degree are the natural setting for a uniqueness theorem.
    regime: Exact stationary axisymmetric vacuum.
    significance: Reduces the question to finite-dimensional linear algebra once the operator class is fixed.
  - statement: >-
      Perturbative “hidden symmetry” and approximate commutators (variant (c)) are addressed elsewhere (e.g. K-306) and
      are not assumed here.
    regime: Near-Kerr / approximate operators (context only).
    significance: Prevents conflating exact algebraic classification with stability-scale PDE questions.
remaining_gap: >-
  A published-quality proof or counterexample in the stated $\mathcal{D}_{\le 2}$ class (or a corrected sharp class if
  this one is ill-posed), including the Hamiltonian formulation.
status_explanation: >-
  **Open (exact Kerr, algebraic):** variant (a) is now pinned; variants (b–c) are explicitly deferred. The literature
  often uses separability without a standalone uniqueness theorem matching $\mathcal{D}_{\le 2}$—this entry records that
  precise target.
math_required: >-
  Symplectic geometry; Killing tensors; Carter’s theory; spectral theory on stationary backgrounds; separation
  of variables for wave operators.
completion_criteria: >-
  A complete proof or counterexample in the pinned $\mathcal{D}_{\le 2}$ class, including equivalence between the
  Hamiltonian and $\Box_g$ formulations if both are claimed.
implications: >-
  Algebraic backbone for Kerr scattering and QNM separability programs if a sharp theorem is obtained.
