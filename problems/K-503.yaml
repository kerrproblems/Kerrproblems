id: K-503
title: Uniqueness questions for Carter-type symmetry operators on Kerr
short_title: Carter operator uniqueness (scoping variants)
cluster: rigidity-uniqueness
theorem_status: open
problem_type: formalization_target
maturity: provisional
evidence_level: primary_refs_present
verification_state: editorial_revision_needed
priority: low
summary: >-
  This entry intentionally lists multiple non-equivalent scoping variants for “uniqueness of the Carter
  symmetry operator”; maintainers must pin one before treating the problem as flagship-class.
problem_statement: >-
  Clarify and then solve an appropriate uniqueness statement for Carter-type quadratic conserved quantities /
  symmetry operators for geodesic or scalar-wave motion on Kerr. At minimum distinguish: (a) exact operator
  identities on exact Kerr within a stated finite-dimensional algebra of differential operators; (b)
  uniqueness modulo adding functions of the obvious commuting conserved quantities; (c) robust statements
  for perturbed metrics where only approximate commutation holds. The database does not endorse one reading
  without further editorial verification.
statement: >-
  Clarify and then solve an appropriate uniqueness statement for Carter-type quadratic conserved quantities /
  symmetry operators for geodesic or scalar-wave motion on Kerr. At minimum distinguish: (a) exact operator
  identities on exact Kerr within a stated finite-dimensional algebra of differential operators; (b)
  uniqueness modulo adding functions of the obvious commuting conserved quantities; (c) robust statements
  for perturbed metrics where only approximate commutation holds. The database does not endorse one reading
  without further editorial verification.
why_it_matters: >-
  Separability on Kerr is not accidental; pinning an operator-level uniqueness theorem clarifies what
  survives under perturbation (cf. K-306, K-508).
scope:
  background: Exact Kerr and, for variant (c), smooth perturbations; geodesic flow and/or scalar wave operator.
  equation_type: Hamiltonian/Wave-operator commutator algebra; finite-order differential operators on the phase space / spacetime.
  linearity: >-
    Variants (a–b) are typically exact algebraic; variant (c) involves approximate commutation with error
    control.
  regularity: Smooth coefficients on the relevant bundles unless a weaker class is explicitly fixed.
  parameter_regime: Subextremal Kerr parameters; perturbation size for (c) must be quantified.
  asymptotics: Local / algebraic on Kerr; global issues only if explicitly posed.
  gauge_or_formulation: >-
    Operator classes must be specified (order, locality, polynomial momentum dependence) to avoid trivial
    reformulations.
known_results: []
remaining_gap: >-
  Editorial: choose a single precise formulation (or split into separate problem IDs). Mathematical: prove
  or refute uniqueness under that formulation.
status_explanation: >-
  `editorial_revision_needed` because the original one-line statement blended distinct mathematical targets;
  this page surfaces the split explicitly rather than guessing which variant the literature addresses.
math_required: >-
  Symplectic geometry; Killing tensors; Carter’s theory; spectral theory on stationary backgrounds; separation
  of variables for wave operators.
completion_criteria: >-
  A uniqueness proof under explicit hypotheses on operator order, locality, and commutation with the
  Hamiltonian or wave operator—for the chosen variant.
implications: >-
  Algebraic backbone for Kerr scattering and QNM separability programs if a sharp theorem is obtained.
