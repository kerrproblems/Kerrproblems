status_explanation: >-
  **Conditional (explicit hypothesis):** quantitative mode stability is a **spectral assumption** on the fixed
  Kerr–de Sitter background (quasinormal-mode/gap-type bounds in relevant sectors); feeding it into nonlinear stability
  requires an additional bridge theorem—this entry names that split rather than asserting an unconditional nonlinear
  closure.
