summary: >-
  Stationary, asymptotically flat vacuum spacetimes admit tensorial characterizations of the Kerr geometry via the
  (spacetime) Simon/Mars tensor and related Weyl–Killing alignment conditions (Mars, CQG 1999). Separately, perturbative
  stationary uniqueness near Kerr often proceeds via Carleman-type estimates and curvature tensors in weighted Sobolev
  classes. This **formalization** problem asks for a proof-assistant–ready modularization: state minimal axioms (smoothness,
  stationarity, AF fall-off, smallness in a named norm), list lemmas with precise hypotheses, and isolate where
  Simon/Mars identities substitute for raw tensor estimates—without claiming a new PDE theorem beyond the literature.
problem_statement: >-
  Produce a machine-checkable proof skeleton (e.g. Lean/Coq) that derives a stated **local** perturbative uniqueness or
  rigidity lemma for smooth stationary AF vacuum metrics near Kerr, following a published Carleman/unique continuation
  route, and explicitly interfaces any use of the Mars/Simon tensor characterization as algebraic lemmas (not as a black
  box “Kerr uniqueness”).
