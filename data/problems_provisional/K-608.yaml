status_explanation: >-
  **Open / partial:** slowly rotating Kerr–de Sitter is a natural $\Lambda>0$ counterpart to the asymptotically flat Kerr
  program; unconditional **nonlinear** stability in a sharp topology is not recorded here as closed. Linear microlocal
  decay tools on Kerr–de Sitter exist, but closing a global nonlinear theorem still requires hypotheses matching the
  positive-cosmological-constant geometry.
