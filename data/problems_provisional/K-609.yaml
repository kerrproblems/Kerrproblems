status_explanation: >-
  **Conditional (explicit hypothesis):** nonlinear Kerr–de Sitter stability is asserted only after assuming a quantitative
  mode-stability / spectral-gap condition (no growing gauge-invariant modes) on the fixed background family; the theorem
  target is not unconditional over the full subextremal moduli without that spectral input.
