status_explanation: >-
  **Partial:** Teukolsky master equations on fixed subextremal Kerr now have global boundedness/decay theorems in the full
  $|a|<M$ regime (DHR–Teixeira da Costa program). What remains **open on this page’s phrasing** is a single
  clean **metric-level linearized Einstein** statement in a fixed gauge, with rates transparently inherited from that
  program—or a proved equivalence package spelling the norms.
