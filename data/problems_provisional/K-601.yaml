known_results:
  - statement: >-
      Dafermos–Holzegel–Rodnianski–Teixeira da Costa develop **boundedness and polynomial decay** for Teukolsky equations of
      spins $\pm1,\pm2$ on Kerr in the **full subextremal** parameter range (frequency-based series starting arXiv:2007.07211),
      building on the small-$|a|/M$ case (arXiv:1711.07944).
    regime: Linearized curvature master equations on exact subextremal Kerr, asymptotically flat exterior.
    significance: >-
      Closest unconditional “linear stability” result at the level of gauge-invariant master variables; metric-level
      bookkeeping is the remaining packaging question for this entry.
  - statement: >-
      Linearized **scalar** wave decay on subextremal Kerr is classical in comparison; Teukolsky/gravitational degrees
      require the spin-dependent framework above.
    regime: Scalar vs spin-2 on Kerr.
    significance: Separates scalar templates from the gravitational master equations actually addressed by the DHR program.
  - statement: >-
      Nonlinear Kerr stability is proved only for small $|a|/M$ (Klainerman–Szeftel program); this entry concerns linearized
      theory but is motivated by wanting a **parameter-global** linear backbone matching the Teukolsky literature.
    regime: Nonlinear vs linearized landscape.
    significance: Clarifies that partial progress here is **not** claiming a new nonlinear theorem.
remaining_gap: Prove unconditional linear stability of Kerr (full subextremal range) in a fixed gauge, with full decay rates.
