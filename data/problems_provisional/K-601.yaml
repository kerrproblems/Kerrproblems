summary: >-
  Prove a definitive **linearized Einstein vacuum** stability statement for the full subextremal Kerr family $|a|<M$ in an
  explicitly fixed gauge/regularity class, including sharp or integrable decay rates comparable to the Teukolsky
  program. Boundedness and decay for the Teukolsky master equations on fixed Kerr are now developed through the full
  subextremal range in the Dafermos–Holzegel–Rodnianski–Teixeira da Costa program; the remaining packaging issue is how
  far this implies a single global theorem for the full linearized metric perturbation in a chosen gauge without hidden
  small-$|a|/M$ restrictions.
problem_statement: >-
  Establish boundedness and quantitative decay for solutions to the **linearized Einstein vacuum equations** around
  subextremal Kerr, for all $|a|<M$, in a named gauge (double-null, generalized harmonic, etc.) and Sobolev class—**or**
  prove an equivalent formulation (e.g. master-variable/control norms) that is clearly equivalent to linearized metric
  stability and records the sharp rates. The Teukolsky-equation results on the Kerr exterior should be cited as the
  current theorem-level backbone.
