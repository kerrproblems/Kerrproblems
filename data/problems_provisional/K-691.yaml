known_results:
  - statement: >-
      Aretakis instability and conserved charges on extremal horizons are established for scalar test fields; spin-2 and
      nonlinear extremal dynamics are much less complete.
    regime: Extremal horizons; often linear scalar.
    significance: Shows qualitative difference from subextremal decay.
  - statement: Subextremal nonlinear Kerr stability is known for small $|a|/M$; uniformity as $|a|\to M$ is not a corollary.
    regime: Nonlinear vacuum, restricted subextremal window.
    significance: Separates near-extremal uniformity from existing subextremal theorems.
  - statement: Near-horizon NHEK limits capture extremal mode structure but matching to global Kerr is an open PDE bridge.
    regime: Near-horizon scaling limits.
    significance: Clarifies what NHEK analyses do and do not imply globally.
